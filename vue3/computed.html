<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vue computed order</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  </head>
  <body>
    <div id="app"></div>

    <script>
      const { ref, computed } = Vue

      const a = ref(0)
      const b = ref(100)

      const c1 = computed(() => {
        console.trace('c1 running')
        return a.value > 0 ? b.value : 0
      })

      const c2 = computed(() => {
        console.trace('c2 running')
        return c1.value + 10
      })

      console.trace('--- 阶段 1 ---')
    //   console.log('c2:', c2.value)
    const v = c2.value
    document.body.textContent = v
    // alert(c2.value)


      console.trace('--- 阶段 2 ---')
      a.value = 1
    //   console.log('c2:', c2.value)
    const v1 = c2.value
    document.body.textContent = v1
    // alert(v1)

      console.trace('--- 阶段 3 ---')
      b.value = 200
    //   console.log('c2:', c2.value)
    const v2 = c2.value
    document.body.textContent = v2
    // alert(v2)
</script>
  </body>
</html>
